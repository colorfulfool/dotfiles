monitor=,preferred,auto,1

# Set programs that you use
$terminal = kitty
$fileManager = nautilus
$browser = chromium
$menu = wofi -iIa --show drun --style ~/.config/wofi/style.css -W 800

$cursorTheme = BreezeX-Black 
$cursorSize = 32 

# Execute your favorite apps at launch
exec-once = uwsm app -- waybar
exec-once = uwsm app -- hypridle
exec-once = uwsm app -- swaybg -i ~/.dotfiles/nix/city.jpg -m fill 
exec-once = uwsm app -- hyprctl setcursor $cursorTheme $cursorSize
exec-once = uwsm app -- yin_yang --minimized

env = XCURSOR_THEME, $cursorTheme
env = XCURSOR_SIZE, $cursorSize
env = QT_QPA_PLATFORMTHEME, qt6ct
env = TERMINAL, $terminal

input {
    kb_layout = us

    follow_mouse = 1

    touchpad {
        natural_scroll = yes
    }

    natural_scroll = yes
    sensitivity = 0 # -1.0 to 1.0, 0 means no modification.

    repeat_delay = 200
    repeat_rate = 30
}

cursor {
    hide_on_key_press = true
}

general {
    gaps_in = 0
    gaps_out = 0
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    snap {
      border_overlap = yes
    }

    layout = dwindle

    allow_tearing = false
}

decoration {
    rounding = 0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
    
    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }

    layerrule = blur on, match:namespace waybar
    windowrule = no_blur on, match:class ^()$, match:title ^()$
}

group {
  col.border_active = rgba(33ccffee) rgba(00ff99ee) 45deg
  col.border_inactive = rgba(595959aa)

  groupbar {
    font_family = JetBrainsMono Nerd Font
    gradients = yes

    col.active = rgba(24242499)
    col.inactive = rgba(00000099)

    gaps_in = 0
    gaps_out = 0
  }
}

animations {
    enabled = yes

    animation = windows, 1, 7, default
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = fadeLayers, 1, 3, default
    animation = fadeLayersOut, 1, 1, default
    animation = workspaces, 0, 6, default
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

misc {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    disable_hyprland_logo = true
    disable_splash_rendering  = true
}

# Floating windows
windowrule = float on, center on, size 800 600, match:tag floating-window

windowrule = tag +floating-window, match:class (blueberry.py|Impala|Wiremix|org.gnome.NautilusPreviewer|com.gabm.satty|Omarchy|About|TUI.float|Netsoft-com.netsoft.hubstaff|localsend)
windowrule = tag +floating-window, match:class (xdg-desktop-portal-gtk|DesktopEditors|org.gnome.Nautilus), match:title ^(Open.*Files?|Open [F|f]older.*|Save.*Files?|Save.*As|Save|All Files)

windowrule = float on, size 995 800, match:class (Slack|sublime_merge)
windowrule = border_size 0, rounding 15, match:title Picture in picture
windowrule = tile on, match:class ^(Godot)$, match:title ^(Godot)$
# windowrule = border_size 0, no_anim on, match:class ^(Godot)$, match:title ^()$
windowrule = size 900 600, center on, match:class ^(blender)$, match:title ^(Blender)$

# Better Control
windowrule = float on, border_size 0, animation slide top, move (monitor_w-810) (52), size 800 550, rounding 10, opacity 0.95, match:class better_control.py

windowrule = suppress_event maximize, match:class .*

layerrule = animation fade, match:namespace wofi
layerrule = blur on, match:namespace wofi

# Omarchy stuff
source = ~/.local/share/omarchy/default/hypr/bindings/utilities.conf

# Tiling
bind = SUPER, X, killactive, 
bind = SUPER, C, killactive, 
bind = SUPER, V, togglefloating, 
bind = SUPER, P, pseudo, # dwindle
bind = SUPER, F, fullscreen, 0
bind = SUPER SHIFT, G, togglegroup
bind = SUPER, G, togglesplit
bind = SUPER ALT, G, changegroupactive, f

# Applications
bind = SUPER, W, exec, $terminal
bind = SUPER, R, exec, $menu
bind = SUPER, E, exec, $fileManager
bindd = SUPER, B, Browser, exec, $browser
bindd = SUPER SHIFT, B, Browser (private), exec, $browser --private
bindd = SUPER ALT, SPACE, Omarchy menu, exec, omarchy-menu
bindd = SUPER CTRL, L, Lock screen, exec, pidof hyprlock || hyprlock
bindd = SUPER, M, Music, exec, omarchy-launch-or-focus spotify
bindd = SUPER, A, Grok, exec, omarchy-launch-webapp "https://grok.com"
bindd = SUPER, T, Top, exec, $terminal -e btop

# Take screenshots like on MacOS
bind = ALT_SHIFT, 3, exec, hyprshot -m output 
bind = ALT_SHIFT, 4, exec, hyprshot -m region

# Volume and Media Control
bind = , XF86AudioRaiseVolume, exec, pamixer -i 10 
bind = , XF86AudioLowerVolume, exec, pamixer -d 10 
bind = , XF86AudioMicMute, exec, pamixer --default-source -m
bind = , XF86AudioMute, exec, pamixer -t
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioPause, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86MonBrightnessUp, exec, brightnessctl set 10%+
bind = , XF86MonBrightnessDown, exec, brightnessctl set 10%-

# Move focus with mainMod + arrow keys
bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d

# Move window with mainMod + SHIFT + arrow keys
bind = SUPER SHIFT, left, movewindow, l
bind = SUPER SHIFT, right, movewindow, r
bind = SUPER SHIFT, up, movewindow, u
bind = SUPER SHIFT, down, movewindow, d

# Resize window with mainMod + ALT + arrow keys
bind = SUPER ALT, right, resizeactive, 100 0
bind = SUPER ALT, left, resizeactive, -100 0
bind = SUPER ALT, up, resizeactive, 0 -100
bind = SUPER ALT, down, resizeactive, 0 100

# Move focus with mainMod + HJKL
bind = SUPER, H, movefocus, l
bind = SUPER, L, movefocus, r
bind = SUPER, K, movefocus, u
bind = SUPER, J, movefocus, d

# Move window with mainMod + SHIFT + HJKL
bind = SUPER SHIFT, H, movewindow, l
bind = SUPER SHIFT, L, movewindow, r
bind = SUPER SHIFT, K, movewindow, u
bind = SUPER SHIFT, J, movewindow, d

# Resize window with mainMod + ALT + HJKL
bind = SUPER ALT, H, resizeactive, 100 0
bind = SUPER ALT, L, resizeactive, -100 0
bind = SUPER ALT, K, resizeactive, 0 -100
bind = SUPER ALT, J, resizeactive, 0 100

# Switch workspaces with mainMod + [0-9]
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = SUPER, S, togglespecialworkspace, magic
bind = SUPER SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow
