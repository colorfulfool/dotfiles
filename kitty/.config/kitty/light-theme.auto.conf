# Konsole "Black on White" theme for Kitty
# Based on the original color scheme from KDE's Git repository [citation:9]

foreground            #000000
background            #ffffff

# Black (VGA Black)
color0                #000000
# Red (Full RGB Red)
color1                #b21818
# Green (Full RGB Green)
color2                #18b218
# Yellow (Full RGB Yellow)
color3                #b26818
# Blue (Full RGB Blue)
color4                #1818b2
# Magenta (Full RGB Magenta)
color5                #b218b2
# Cyan (Full RGB Cyan)
color6                #18b2b2
# White (Full RGB White)
color7                #b2b2b2

# Bright Black (VGA Bright Black / Dark Gray)
color8                #686868
# Bright Red (Full RGB Red - often rendered as bold)
color9                #ff5454
# Bright Green (Full RGB Green - often rendered as bold)
color10               #54ff54
# Bright Yellow (Full RGB Yellow - often rendered as bold)
color11               #ffff54
# Bright Blue (Full RGB Blue - often rendered as bold)
color12               #5454ff
# Bright Magenta (Full RGB Magenta - often rendered as bold)
color13               #ff54ff
# Bright Cyan (Full RGB Cyan - often rendered as bold)
color14               #54ffff
# Bright White (Full RGB White - often rendered as bold)
color15               #ffffff

# Cursor and selection colors
cursor                #000000
cursor_text_color     #ffffff
selection_foreground  #000000
selection_background  #f4f4f4

inactive_tab_background #bbb
