add_newline = false
command_timeout = 200
format = "[$directory$git_branch$git_status]($style)$character"

[character]
error_symbol = "[\\$](bold blue)"
success_symbol = "[\\$](bold blue)"
vicmd_symbol = "[V](bold yellow)"

[directory]
style = "blue"
truncation_length = 1
truncation_symbol = "…/"
repo_root_style = "bold blue"
repo_root_format = "[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "

[git_branch]
style = "blue"
format = "[$branch]($style) "

[git_status]
style      = "blue"
format     = '[$all_status]($style)'
ahead      = "⇡${count} "
diverged   = "⇕⇡${ahead_count}⇣${behind_count} "
behind     = "⇣${count} "
conflicted = " "
up_to_date = " "
untracked  = "? "
modified   = " "
stashed    = ""
staged     = ""
renamed    = ""
deleted    = ""
